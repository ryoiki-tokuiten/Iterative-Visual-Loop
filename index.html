<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iterative Visual Refinements</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            // Obsidian-based palette
            surface: {
              0: '#08080a', // Obsidian dark bg
              1: '#0f0f13', // Surface panel bg
              2: '#121217', // Alternate panel bg
              3: '#22222a', // Border bg
              4: '#3f3f4e'  // Active border bg / wall
            },
            accent: {
              DEFAULT: '#00e599', // Obsidian Accent Green
              muted: '#00b377',
              subtle: 'rgba(0, 229, 153, 0.1)'
            },
            text: {
              primary: '#e2e8f0', // Text main
              secondary: '#a1aab5', // Text muted
              muted: '#64748b',
              dim: '#475569'
            }
          },
          fontFamily: {
            sans: ['"Google Sans"', 'Inter', 'system-ui', 'sans-serif'],
            mono: ['"Fira Code"', 'monospace'],
          },
          animation: {
            'fade-in': 'fadeIn 0.2s ease-out',
            'slide-up': 'slideUp 0.3s ease-out',
            'pulse-subtle': 'pulseSubtle 2s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0' },
              '100%': { opacity: '1' },
            },
            slideUp: {
              '0%': { opacity: '0', transform: 'translateY(10px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            pulseSubtle: {
              '0%, 100%': { opacity: '1' },
              '50%': { opacity: '0.7' },
            }
          }
        }
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      background-color: #08080a;
      color: #e2e8f0;
      font-family: "Google Sans", "Inter", sans-serif;
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: #3f3f46;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #52525b;
    }

    /* Smooth rendering */
    * {
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>

</html>
